name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service=vpn-rating-watcher
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

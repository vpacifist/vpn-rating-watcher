name: Monitor Railway

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Read logs
        id: logs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway logs --service=vpn-rating-watcher --lines 200 > logs.txt

      - name: Analyze logs
        run: |
          echo "### LOGS"
          cat logs.txt

          echo "### ANALYSIS"
          if grep -i "error\|exception\|failed" logs.txt; then
            echo "❌ Найдена ошибка"
          else
            echo "✅ Ошибок не найдено"
          fi

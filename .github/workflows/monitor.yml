name: Monitor Railway

on:
  workflow_run:
    workflows: ["Deploy"]
    types:
      - completed

jobs:
  logs:
    runs-on: ubuntu-latest

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Read logs
        id: logs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway logs --service=vpn-rating-watcher --lines 200 > logs.txt

      - name: Analyze logs
        run: |
          echo "### ANALYSIS"

          if grep -i "error\|exception\|failed" logs.txt; then
            echo "❌ ERROR FOUND"
            exit 1

            echo "### TASK FOR CODEX"
            echo "Fix the error from logs above. 
            Analyze root cause and provide a minimal patch.
            Do not rewrite unrelated code."
          else
            echo "✅ OK"
          fi

      - name: Prepare Codex task
        if: failure()
        run: |
          echo "@codex Fix the error described below. Provide minimal patch." > codex_task.txt
          cat logs.txt >> codex_task.txt

      - name: Create issue for Codex
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "Auto: fix Railway error"
          content-filepath: codex_task.txt
          labels: bug, auto-fix
